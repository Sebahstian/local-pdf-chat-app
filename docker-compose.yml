# One-command demo: `docker compose up` starts Ollama, pulls both models,
# and serves the app at http://localhost:8501. No local Python or Ollama needed.

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama   # cache models across restarts
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot job: pulls the chat + embedding models, then exits.
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull llama3.2:3b && ollama pull nomic-embed-text"
    restart: "no"

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully

volumes:
  ollama-models:
